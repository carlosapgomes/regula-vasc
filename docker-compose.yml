services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: regula_vasc
      POSTGRES_PASSWORD: regula_vasc_dev
      POSTGRES_DB: regula_vasc_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regula_vasc"]
      interval: 2s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://regula_vasc:regula_vasc_dev@db:5432/regula_vasc_dev
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run manage.py migrate &&
             uv run manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata:
