{% extends "base.html" %}

{% block title %}{{ app_display_name }} — Senha Redefinida{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4 text-center">
                <div class="mb-3" style="font-size: 3rem;">✓</div>
                <h3 class="mb-3">Senha Redefinida com Sucesso</h3>
                <p class="text-muted mb-4">
                    Sua senha foi alterada. Agora você pode fazer login com sua nova senha.
                </p>
                <a href="{% url 'login' %}" class="btn btn-hospital">Fazer login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
