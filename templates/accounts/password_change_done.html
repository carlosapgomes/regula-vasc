{% extends "base.html" %}

{% block title %}{{ app_display_name }} — Senha Alterada{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-hospital text-white">
                <h4 class="mb-0">Senha alterada com sucesso</h4>
            </div>
            <div class="card-body">
                <p class="mb-0">Sua senha foi alterada. Você permanece autenticado normalmente.</p>
            </div>
            <div class="card-footer d-flex justify-content-end gap-2">
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">Voltar ao início</a>
                <a href="{% url 'profile' %}" class="btn btn-hospital">Voltar ao perfil</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
