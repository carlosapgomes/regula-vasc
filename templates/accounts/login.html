{% extends "base.html" %}
{% load static %}

{% block title %}{{ app_display_name }} — Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">{{ app_display_name }}</h3>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Usuário</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Senha</label>
                        <div class="input-group">
                            {{ form.password }}
                            <button type="button" class="btn btn-outline-secondary toggle-password"
                                    data-target="{{ form.password.auto_id }}" aria-label="Mostrar senha">
                                <span class="toggle-icon" aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-hospital w-100">Entrar</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small">
                        Esqueci minha senha
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/password-toggle.js' %}"></script>
{% endblock %}
